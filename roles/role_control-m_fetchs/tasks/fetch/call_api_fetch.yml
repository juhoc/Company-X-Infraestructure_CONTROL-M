---
- block:
    - name: Company-X-Infraestructure_CONTROL-M_Fetchs
      uri:
        url: "{{ tower_base_url }}/api/v2/job_templates/{{ job_template_id }}/launch/"
        validate_certs: false
        force_basic_auth: true
        status_code: [200, 201, 204, 400]
        method: POST
        headers:
          Authorization: "Bearer {{ tower_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          inventory: 2
          credentials: [6]
          limit: ""
          extra_vars:
            '{ 
              "tarea": "{{ accionjtp1.tarea }}",
             }'
      loop: "{{ lineas.split('\n') }}"
      register: lanzar_plantilla
  delegate_to: localhost
  run_once: true